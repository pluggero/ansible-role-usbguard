---
# Installation
usbguard_install_method: "package"

# Service control
usbguard_service_enabled: true
usbguard_service_state: "started"

# Reject rules containing parent-hash or with-connect-type at run time.
usbguard_stable_rules: true

# Daemon configuration — rendered into /etc/usbguard/usbguard-daemon.conf
usbguard_daemon_config:
  RuleFile: "/etc/usbguard/rules.conf"
  RuleFolder: "/etc/usbguard/rules.d/"
  ImplicitPolicyTarget: "block"
  PresentDevicePolicy: "apply-policy"
  PresentControllerPolicy: "apply-policy"
  InsertedDevicePolicy: "apply-policy"
  RestoreControllerDeviceState: "false"
  AuthorizedDefault: "none"
  IPCAllowedUsers: "root"
  IPCAllowedGroups: ""
  IPCAccessControlFiles: "/etc/usbguard/IPCAccessControl.d/"
  DeviceManagerBackend: "uevent"
  DeviceRulesWithPort: "false"
  AuditBackend: "FileAudit"
  AuditFilePath: "/var/log/usbguard/usbguard-audit.log"
  HidePII: "false"

# Rules directory
usbguard_rules_dir: "/etc/usbguard/rules.d"
usbguard_rules_dir_mode: "0700"

# Inline rules deployed to rules.d/. file_number (required) controls load order and the
# filename prefix; file_name (optional) is appended to give a human-readable label.
# Blocks sharing the same file_number + file_name are merged into one file.
usbguard_rules: []
# - file_number: 10                        # required
#   file_name: "office"                    # optional → 10-office.conf
#   comment: "Office LAN"
#   entries:
#     - 'allow id xxxx:xxxx serial "..." name "..." hash "..." with-interface xx:xx:xx'
# - file_number: 20                        # required → 20.conf
#   comment: "Internal devices"            # renders as: # Internal devices
#   entries:
#     - comment: "Device description"      # renders as: ## Device description
#       rule: 'allow id xxxx:xxxx serial "..." name "..." hash "..." with-interface xx:xx:xx'
#     - 'allow id xxxx:xxxx serial "..." name "..." hash "..." with-interface xx:xx:xx'


# Create a placeholder 99-manual-rules.conf in rules.d/ for operator-managed rules.
# Ansible seeds the file once (force: false) and never overwrites it.
usbguard_create_manual_rules_file: true

# System group created by the role. Members get USBGuard IPC access via the group ACL file.
usbguard_group: "usbguard"

# IPC privileges granted to usbguard_group via IPCAccessControl.d/:{{ usbguard_group }}.
usbguard_group_ipc:
  devices: ["list"]
  policy: []
  exceptions: []

# Users to add to usbguard_group. Defaults to the Ansible connection user.
usbguard_users:
  - "{{ ansible_user }}"
# - "alice"
