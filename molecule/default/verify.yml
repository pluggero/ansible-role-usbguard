---
- name: Verify
  hosts: all
  gather_facts: true

  vars_files:
    - ../../defaults/main.yml
    - ../../vars/molecule.yml

  vars:
    ansible_user: ansible
    ansible_password: ansible
    ansible_become_password: ansible

  tasks:
    - name: Get usbguard binary path
      ansible.builtin.command:
        cmd: which usbguard
      register: usbguard_which
      changed_when: false

    - name: Assert usbguard binary exists
      ansible.builtin.assert:
        that:
          - usbguard_which.rc == 0
        fail_msg: "usbguard binary not found via 'which usbguard'"

    - name: Check /etc/usbguard/usbguard-daemon.conf exists
      ansible.builtin.stat:
        path: /etc/usbguard/usbguard-daemon.conf
      register: usbguard_conf_stat
      become: true

    - name: Assert daemon config exists with correct mode
      ansible.builtin.assert:
        that:
          - usbguard_conf_stat.stat.exists
          - usbguard_conf_stat.stat.mode == "0600"
        fail_msg: "/etc/usbguard/usbguard-daemon.conf not found or wrong permissions"

    - name: Read daemon config content
      ansible.builtin.slurp:
        src: /etc/usbguard/usbguard-daemon.conf
      register: usbguard_conf_content
      become: true

    - name: Assert ImplicitPolicyTarget is set to block
      ansible.builtin.assert:
        that:
          - "'ImplicitPolicyTarget=block' in (usbguard_conf_content.content | b64decode)"
        fail_msg: "ImplicitPolicyTarget=block not found in usbguard-daemon.conf"

    - name: Assert IPCAllowedGroups is empty
      ansible.builtin.assert:
        that:
          - "'IPCAllowedGroups=' in (usbguard_conf_content.content | b64decode)"
        fail_msg: "IPCAllowedGroups is not set to empty in usbguard-daemon.conf"

    - name: Check usbguard audit log directory exists
      ansible.builtin.stat:
        path: "{{ usbguard_daemon_config.AuditFilePath | dirname }}"
      register: usbguard_audit_dir_stat
      become: true
      when:
        - usbguard_daemon_config.AuditBackend is defined
        - usbguard_daemon_config.AuditBackend == "FileAudit"
        - usbguard_daemon_config.AuditFilePath is defined

    - name: Assert usbguard audit log directory exists with correct mode
      ansible.builtin.assert:
        that:
          - usbguard_audit_dir_stat.stat.exists
          - usbguard_audit_dir_stat.stat.isdir
          - usbguard_audit_dir_stat.stat.mode == "0750"
        fail_msg: "{{ usbguard_daemon_config.AuditFilePath | dirname }} not found or wrong permissions"
      when:
        - usbguard_daemon_config.AuditBackend is defined
        - usbguard_daemon_config.AuditBackend == "FileAudit"
        - usbguard_daemon_config.AuditFilePath is defined

    - name: Check rules directory exists
      ansible.builtin.stat:
        path: /etc/usbguard/rules.d
      register: usbguard_rules_dir_stat
      become: true

    - name: Assert rules directory exists with correct mode
      ansible.builtin.assert:
        that:
          - usbguard_rules_dir_stat.stat.exists
          - usbguard_rules_dir_stat.stat.isdir
          - usbguard_rules_dir_stat.stat.mode == "0700"
        fail_msg: "/etc/usbguard/rules.d not found or wrong permissions"

    - name: Check 10-xhci.conf exists
      ansible.builtin.stat:
        path: "{{ usbguard_rules_dir }}/10-xhci.conf"
      register: usbguard_rules_10_stat
      become: true

    - name: Assert 10-xhci.conf exists with correct mode
      ansible.builtin.assert:
        that:
          - usbguard_rules_10_stat.stat.exists
          - usbguard_rules_10_stat.stat.mode == "0600"
        fail_msg: "{{ usbguard_rules_dir }}/10-xhci.conf not found or wrong permissions"

    - name: Read 10-xhci.conf content
      ansible.builtin.slurp:
        src: "{{ usbguard_rules_dir }}/10-xhci.conf"
      register: usbguard_rules_10_content
      become: true

    - name: Assert 10-xhci.conf contains managed-by header
      ansible.builtin.assert:
        that:
          - "'Managed by Ansible' in (usbguard_rules_10_content.content | b64decode)"
        fail_msg: "Managed-by header not found in 10-xhci.conf"

    - name: Assert 10-xhci.conf contains block comment heading
      ansible.builtin.assert:
        that:
          - "'# Test hub' in (usbguard_rules_10_content.content | b64decode)"
        fail_msg: "Block comment '# Test hub' not found in 10-xhci.conf"

    - name: Assert 10-xhci.conf contains per-entry comment
      ansible.builtin.assert:
        that:
          - "'## Primary controller' in (usbguard_rules_10_content.content | b64decode)"
        fail_msg: "Per-entry comment '## Primary controller' not found in 10-xhci.conf"

    - name: Assert 10-xhci.conf contains xHCI allow rules
      ansible.builtin.assert:
        that:
          - "'allow id 1d6b:0002' in (usbguard_rules_10_content.content | b64decode)"
          - "'allow id 1d6b:0003' in (usbguard_rules_10_content.content | b64decode)"
        fail_msg: "One or more expected xHCI allow rules not found in 10-xhci.conf"

    - name: Check 20.conf exists
      ansible.builtin.stat:
        path: "{{ usbguard_rules_dir }}/20.conf"
      register: usbguard_rules_20_stat
      become: true

    - name: Assert 20.conf exists with correct mode
      ansible.builtin.assert:
        that:
          - usbguard_rules_20_stat.stat.exists
          - usbguard_rules_20_stat.stat.mode == "0600"
        fail_msg: "{{ usbguard_rules_dir }}/20.conf not found or wrong permissions"

    - name: Read 20.conf content
      ansible.builtin.slurp:
        src: "{{ usbguard_rules_dir }}/20.conf"
      register: usbguard_rules_20_content
      become: true

    - name: Assert 20.conf contains managed-by header
      ansible.builtin.assert:
        that:
          - "'Managed by Ansible' in (usbguard_rules_20_content.content | b64decode)"
        fail_msg: "Managed-by header not found in 20.conf"

    - name: Assert 20.conf contains EHCI allow rule
      ansible.builtin.assert:
        that:
          - "'allow id 1d6b:0001' in (usbguard_rules_20_content.content | b64decode)"
        fail_msg: "Expected EHCI allow rule not found in 20.conf"

    - name: Check manual rules placeholder exists
      ansible.builtin.stat:
        path: "{{ usbguard_rules_dir }}/99-manual-rules.conf"
      register: usbguard_manual_rules_stat
      become: true

    - name: Assert manual rules placeholder exists with correct mode
      ansible.builtin.assert:
        that:
          - usbguard_manual_rules_stat.stat.exists
          - usbguard_manual_rules_stat.stat.mode == "0600"
        fail_msg: "{{ usbguard_rules_dir }}/99-manual-rules.conf not found or wrong permissions"

    - name: Read manual rules placeholder content
      ansible.builtin.slurp:
        src: "{{ usbguard_rules_dir }}/99-manual-rules.conf"
      register: usbguard_manual_rules_content
      become: true

    - name: Assert manual rules placeholder contains header comment
      ansible.builtin.assert:
        that:
          - "'Manual USBGuard rules' in (usbguard_manual_rules_content.content | b64decode)"
        fail_msg: "Header comment not found in 99-manual-rules.conf"

    - name: Check usbguard group IPC access control file exists
      ansible.builtin.stat:
        path: "{{ usbguard_daemon_config.IPCAccessControlFiles }}/:{{ usbguard_group }}"
      register: usbguard_group_acl_stat
      become: true

    - name: Assert group IPC access control file exists with correct mode
      ansible.builtin.assert:
        that:
          - usbguard_group_acl_stat.stat.exists
          - usbguard_group_acl_stat.stat.mode == "0600"
        fail_msg: "IPCAccessControl.d/:{{ usbguard_group }} not found or wrong permissions"

    - name: Read group IPC access control file content
      ansible.builtin.slurp:
        src: "{{ usbguard_daemon_config.IPCAccessControlFiles }}/:{{ usbguard_group }}"
      register: usbguard_group_acl_content
      become: true

    - name: Assert group IPC access control file contains Devices=list
      ansible.builtin.assert:
        that:
          - "'Devices=list' in (usbguard_group_acl_content.content | b64decode)"
        fail_msg: "Devices=list not found in group IPC access control file"

    - name: Check ansible user is in usbguard group
      ansible.builtin.command:
        cmd: id ansible
      register: usbguard_user_id
      changed_when: false

    - name: Assert ansible user belongs to usbguard group
      ansible.builtin.assert:
        that:
          - "usbguard_group in usbguard_user_id.stdout"
        fail_msg: "ansible user is not a member of the {{ usbguard_group }} group"
