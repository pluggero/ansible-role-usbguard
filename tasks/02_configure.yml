---
- name: Configure usbguard
  block:
    - name: Deploy /etc/usbguard/rules.conf
      ansible.builtin.copy:
        content: "# Managed by Ansible - do not edit manually\n"
        dest: /etc/usbguard/rules.conf
        owner: root
        group: root
        mode: "0600"
      become: true
      notify: Restart usbguard

    - name: Ensure usbguard audit log directory exists
      ansible.builtin.file:
        path: "{{ usbguard_daemon_config.AuditFilePath | dirname }}"
        state: directory
        owner: root
        group: root
        mode: "0750"
      become: true
      when:
        - usbguard_daemon_config.AuditBackend is defined
        - usbguard_daemon_config.AuditBackend == "FileAudit"
        - usbguard_daemon_config.AuditFilePath is defined

    - name: Deploy /etc/usbguard/usbguard-daemon.conf
      ansible.builtin.template:
        src: "{{ role_path }}/templates/usbguard-daemon.conf.j2"
        dest: /etc/usbguard/usbguard-daemon.conf
        owner: root
        group: root
        mode: "0600"
      become: true
      notify: Restart usbguard

    - name: Ensure rules directory exists
      ansible.builtin.file:
        path: "{{ usbguard_rules_dir }}"
        state: directory
        owner: root
        group: root
        mode: "{{ usbguard_rules_dir_mode }}"
      become: true

    - name: Group rules blocks by target file
      ansible.builtin.set_fact:
        _usbguard_rule_groups: >-
          {%- set g = namespace(data={}) -%}
          {%- for block in usbguard_rules -%}
            {%- if block.file_name is defined -%}
              {%- set fname = block.file_number | string + '-' + block.file_name + '.conf' -%}
            {%- else -%}
              {%- set fname = block.file_number | string + '.conf' -%}
            {%- endif -%}
            {%- if fname not in g.data -%}{%- set _ = g.data.update({fname: []}) -%}{%- endif -%}
            {%- set _ = g.data[fname].append(block) -%}
          {%- endfor -%}
          {{ g.data }}
      when: usbguard_rules | length > 0

    - name: Deploy rules files
      ansible.builtin.template:
        src: "{{ role_path }}/templates/rules.conf.j2"
        dest: "{{ usbguard_rules_dir }}/{{ item.key }}"
        owner: root
        group: root
        mode: "0600"
      become: true
      notify: Restart usbguard
      vars:
        _blocks: "{{ item.value }}"
      loop: "{{ _usbguard_rule_groups | dict2items }}"
      when: usbguard_rules | length > 0

    - name: Seed manual rules placeholder in rules directory
      ansible.builtin.copy:
        content: |
          # Manual USBGuard rules — not managed by Ansible
          # Add custom rules below this line
        dest: "{{ usbguard_rules_dir }}/99-manual-rules.conf"
        force: false
        owner: root
        group: root
        mode: "0600"
      become: true
      when: usbguard_create_manual_rules_file

    - name: Ensure usbguard group exists
      ansible.builtin.group:
        name: "{{ usbguard_group }}"
        system: true
        state: present
      become: true

    - name: Deploy usbguard group IPC access control file
      ansible.builtin.template:
        src: "{{ role_path }}/templates/ipc-acl.j2"
        dest: "{{ usbguard_daemon_config.IPCAccessControlFiles }}/:{{ usbguard_group }}"
        owner: root
        group: root
        mode: "0600"
      vars:
        acl_entry: "{{ usbguard_group_ipc }}"
      become: true
      notify: Restart usbguard

    - name: Add users to usbguard group
      ansible.builtin.user:
        name: "{{ usbguard_user }}"
        groups: "{{ usbguard_group }}"
        append: true
      loop: "{{ usbguard_users }}"
      loop_control:
        loop_var: usbguard_user
      become: true
      when: usbguard_users | length > 0
