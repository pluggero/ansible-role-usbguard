---
- name: Assert every rule block has file_number
  ansible.builtin.assert:
    that: block.file_number is defined
    fail_msg: >-
      Rule block is missing required file_number — set it to control load order: {{ block | to_nice_yaml }}
  loop: "{{ usbguard_rules }}"
  loop_control:
    loop_var: block
  when: usbguard_rules | length > 0

- name: Assert no rule block uses the reserved 99 prefix
  ansible.builtin.assert:
    that: block.file_number | int != 99
    fail_msg: >-
      Rule block uses reserved file_number 99 — this prefix is reserved for the manual rules file.
  loop: "{{ usbguard_rules | selectattr('file_number', 'defined') | list }}"
  loop_control:
    loop_var: block
  when: usbguard_rules | length > 0

- name: Assert rules do not contain unstable attributes
  ansible.builtin.assert:
    that:
      - "'parent-hash' not in ((entry.rule if entry is mapping else entry) | string)"
      - "'with-connect-type' not in ((entry.rule if entry is mapping else entry) | string)"
    fail_msg: >-
      Rule contains unstable attribute (parent-hash or with-connect-type) — remove it for
      portable rules: {{ entry.rule if entry is mapping else entry }}
  loop: "{{ usbguard_rules | map(attribute='entries') | select | flatten }}"
  loop_control:
    loop_var: entry
  when: usbguard_rules | length > 0 and usbguard_stable_rules
